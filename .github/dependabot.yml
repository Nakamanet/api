version: 2
updates:
  # Garde les GitHub Actions pinnées par SHA à jour (met à jour SHA + commentaire).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  # Dépendances npm (package-lock.json). Patch/minor groupés pour limiter le bruit ;
  # les majors restent en PR séparées (risque de breaking change).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
