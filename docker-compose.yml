services:
  api:
    build: .
    ports:
      - "3333:3333"
    environment:
      HOST: 0.0.0.0
      PORT: 3333
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: catalog
      DB_PASSWORD: catalog
      DB_DATABASE: catalog
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog
    volumes:
      - ./catalog.sql:/docker-entrypoint-initdb.d/catalog.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  